services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartdocs-postgres
    environment:
      POSTGRES_DB: smartdocs
      POSTGRES_USER: smartdocs
      POSTGRES_PASSWORD: smartdocs
    ports:
      - "5432:5432"
    volumes:
      - smartdocs_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartdocs-redis
    ports:
      - "6380:6379"
    volumes:
      - smartdocs_redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: auto-manual-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/migrations:/app/migrations
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://smartdocs:smartdocs@postgres:5432/smartdocs
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: auto-manual-ai-frontend
    ports:
      - "2000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  smartdocs_postgres_data:
  smartdocs_redis_data:

services:
  backend:
    build:
      context: ./backend
    container_name: auto-manual-ai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    container_name: auto-manual-ai-frontend
    ports:
      - "2000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
